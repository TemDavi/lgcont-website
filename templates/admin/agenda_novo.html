{% extends "admin/base_admin.html" %}{% block title %}Novo agendamento | Admin{% endblock %}{% block content %}<section class="panel-heading"><span class="eyebrow">Agenda</span><h1>Novo agendamento</h1></section><form class="panel-form wide-form" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><label>Título<input name="titulo" required></label><label>Cliente<select name="cliente_id" required><option value="">Selecione</option>{% for cliente in clientes %}<option value="{{ cliente.id }}">{{ cliente.usuario.nome }}</option>{% endfor %}</select></label><label>Data<input type="date" name="data" required></label><label>Hora<input type="time" name="hora" required></label><label class="full-field">Descrição<textarea name="descricao"></textarea></label><button class="btn btn-primary">Agendar</button></form>{% endblock %}
