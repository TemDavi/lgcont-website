{% extends "base.html" %}

{% block title %}Criar Senha | Luciano Garces{% endblock %}

{% block content %}
<section class="auth-panel">
  <div>
    <span class="eyebrow">Primeiro acesso</span>
    <h1>Crie sua senha</h1>
    <p>Cadastre uma senha com pelo menos 8 caracteres para acessar a área do cliente.</p>
  </div>

  <form class="panel-form" method="post" action="{{ url_for('ativar_conta', token=token) }}">
    <label>
      Nova senha
      <input type="password" name="senha" minlength="8" autocomplete="new-password" required>
    </label>
    <label>
      Confirmar nova senha
      <input type="password" name="confirmar_senha" minlength="8" autocomplete="new-password" required>
    </label>
    <button class="btn btn-primary" type="submit">Criar senha</button>
  </form>
</section>
{% endblock %}
